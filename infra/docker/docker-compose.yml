services:
  postgres:
    image: postgres:16-alpine
    container_name: jbl-audit-postgres
    environment:
      POSTGRES_DB: jbl_audit
      POSTGRES_USER: jbl
      POSTGRES_PASSWORD: jbl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
